name: Deploy Backend to Droplet

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts
        
    - name: Deploy to Droplet
      run: |
        ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} << 'EOF'
          # Create deployment directory if it doesn't exist
          mkdir -p /opt/hrm-backend
          cd /opt/hrm-backend
          
          # Stop existing backend service
          sudo systemctl stop hrm-backend || true
          sudo systemctl disable hrm-backend || true
          
          # Remove old jar files
          rm -f *.jar
          
          # Create systemd service file
          sudo tee /etc/systemd/system/hrm-backend.service > /dev/null << EOL
          [Unit]
          Description=HRM Backend Service
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/hrm-backend
          ExecStart=/usr/bin/java -jar hrm-backend.jar
          Restart=always
          RestartSec=10
          Environment=SPRING_PROFILES_ACTIVE=prod
          
          [Install]
          WantedBy=multi-user.target
          EOL
          
          # Reload systemd
          sudo systemctl daemon-reload
          
        EOF
        
    - name: Copy JAR file to Droplet
      run: |
        scp target/*.jar ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/opt/hrm-backend/hrm-backend.jar
        
    - name: Start Backend Service
      run: |
        ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} << 'EOF'
          cd /opt/hrm-backend
          
          # Make jar executable
          chmod +x hrm-backend.jar
          
          # Enable and start service
          sudo systemctl enable hrm-backend
          sudo systemctl start hrm-backend
          
          # Check service status
          sudo systemctl status hrm-backend --no-pager
          
          # Wait a moment for service to start
          sleep 10
          
          # Check if backend is running on port 8080
          netstat -tlnp | grep :8080 || echo "Backend not yet listening on port 8080"
          
        EOF
        
    - name: Verify Deployment
      run: |
        sleep 15
        curl -f http://${{ secrets.DROPLET_IP }}:8080/api/test || echo "Backend verification failed"
