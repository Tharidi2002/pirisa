# Production Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hrm_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=hrm_user
spring.datasource.password=hrm_password_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080
server.servlet.context-path=

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Profile Image Storage
file.upload.dir=/opt/hrm-backend/profile-images

# Logging Configuration
logging.level.com.knoweb.HRM=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.file.name=/var/log/pirisa/backend.log

# JWT Configuration
jwt.secret=yourSecretKeyForJWTTokenGenerationWhichShouldBeVeryLongAndSecure
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://129.212.239.12,http://localhost:3000
