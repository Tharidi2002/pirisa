name: Deploy PirisaHRM to Droplet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    #----------------------------------------------------
    # Backend Build
    #----------------------------------------------------
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Backend with Maven
      run: |
        echo "Building backend in HRM-main directory..."
        mvn -f HRM-main/pom.xml clean package
      
    #----------------------------------------------------
    # Frontend Build
    #----------------------------------------------------
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: PirisaHR-main/package-lock.json

    - name: Install Frontend Dependencies
      run: npm install --prefix PirisaHR-main

    - name: Build Frontend
      run: npm run build --prefix PirisaHR-main

    #----------------------------------------------------
    # Deploy to Droplet
    #----------------------------------------------------
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: 'just-a-placeholder-so-we-dont-get-errors'

    - name: Add Droplet to Known Hosts
      run: ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

    - name: Deploy files via SCP
      run: |
        # Deploy Backend .war file
        scp -o StrictHostKeyChecking=no ./HRM-main/target/*.war ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/root/app.war
        
        # Deploy Frontend build files
        # First, remove old files on server
        ssh -o StrictHostKeyChecking=no ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} "rm -rf /var/www/html/*"
        # Then, copy new files
        scp -r -o StrictHostKeyChecking=no ./PirisaHR-main/dist/* ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/var/www/html/

    - name: Restart Application on Droplet
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} << 'EOF'
          # Find and kill the old running Java process
          PID=$(pgrep -f "app.war")
          if [ -n "$PID" ]; then
            echo "Stopping existing application (PID: $PID)..."
            kill $PID
            # Wait for the process to terminate
            sleep 5
          fi
          
          # Start the new application
          echo "Starting new application..."
          nohup java -jar -Dspring.profiles.active=production /root/app.war > /root/app.log 2>&1 &
          
          echo "Deployment complete."
        EOF
