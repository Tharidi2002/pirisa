name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  BACKEND_DIR: HRM-main
  FRONTEND_DIR: PirisaHR-main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Backend
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        ls -la target/
        
    - name: Build Frontend
      working-directory: ${{ env.FRONTEND_DIR }}
      run: |
        npm ci
        npm run build
        ls -la dist/

    - name: Prepare deployment files
      run: |
        mkdir -p deploy-package/backend
        mkdir -p deploy-package/frontend
        mkdir -p deploy-package/scripts
        cp ${{ env.BACKEND_DIR }}/target/*.jar deploy-package/backend/app.jar || echo "No JAR found"
        cp -r ${{ env.FRONTEND_DIR }}/dist/* deploy-package/frontend/ || echo "No frontend build"
        cp deploy-scripts/* deploy-package/scripts/
        ls -la deploy-package/

    - name: Deploy to DigitalOcean
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy-package/*"
        target: "/tmp/pirisa-deploy"
        strip_components: 1

    - name: Execute deployment script
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /tmp/pirisa-deploy
          chmod +x scripts/deploy.sh
          sudo ./scripts/deploy.sh
