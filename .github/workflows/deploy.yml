name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  BACKEND_DIR: HRM-main
  FRONTEND_DIR: PirisaHR-main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build Backend
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        echo "📦 Building backend..."
        chmod +x mvnw
        ./mvnw clean package -DskipTests -e -X
        echo "📂 Checking target directory..."
        ls -la target/ || echo "Target directory not found"
        echo "🔍 Finding JAR files..."
        find . -name "*.jar" -type f
        
    - name: Build Frontend
      working-directory: ${{ env.FRONTEND_DIR }}
      run: |
        echo "🎨 Building frontend..."
        npm ci
        npm run build
        echo "📂 Checking dist directory..."
        ls -la dist/ || echo "Dist directory not found"

    - name: Prepare deployment files
      run: |
        echo "📦 Preparing deployment package..."
        mkdir -p deploy-package/backend
        mkdir -p deploy-package/frontend
        mkdir -p deploy-package/scripts
        
        echo "🔍 Looking for JAR files..."
        find ${{ env.BACKEND_DIR }} -name "*.jar" -type f
        
        # Copy JAR file - find and copy the first JAR that's not empty
        JAR_FILE=$(find ${{ env.BACKEND_DIR }}/target -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -type f | head -1)
        if [ -n "$JAR_FILE" ]; then
          echo "✅ Found JAR: $JAR_FILE"
          cp "$JAR_FILE" deploy-package/backend/app.jar
        else
          echo "❌ No JAR file found!"
          echo "Contents of backend directory:"
          ls -laR ${{ env.BACKEND_DIR }}/target/
          exit 1
        fi
        
        # Copy frontend
        if [ -d "${{ env.FRONTEND_DIR }}/dist" ]; then
          echo "✅ Copying frontend..."
          cp -r ${{ env.FRONTEND_DIR }}/dist/* deploy-package/frontend/
        else
          echo "❌ Frontend dist not found!"
          exit 1
        fi
        
        # Copy scripts
        cp deploy-scripts/* deploy-package/scripts/
        
        echo "📋 Deployment package contents:"
        ls -laR deploy-package/

    - name: Deploy to DigitalOcean
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy-package/*"
        target: "/tmp/pirisa-deploy"
        strip_components: 1

    - name: Execute deployment script
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /tmp/pirisa-deploy
          chmod +x scripts/deploy.sh
          sudo ./scripts/deploy.sh
