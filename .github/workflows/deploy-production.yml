echo "🌐 Application available at: http://129.212.239.12"
echo "🔧 Backend API at: http://129.212.239.12/api"
EOF
        
        chmod +x deploy-package/scripts/setup-production.sh
        
        echo "📋 Deployment package contents:"
        ls -laR deploy-package/

    - name: Deploy to Production Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "deploy-package/*"
        target: "/tmp/deploy"
        strip_components: 1
        timeout: 300s

    - name: Setup Production Environment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /tmp/deploy
          chmod +x scripts/setup-production.sh
          sudo ./scripts/setup-production.sh
          
          # Final verification
          echo "🔍 Final verification..."
          echo "Backend service status:"
          sudo systemctl is-active pirisa-backend && echo "✅ Backend running" || echo "❌ Backend failed"
          
          echo "Nginx status:"
          sudo systemctl is-active nginx && echo "✅ Nginx running" || echo "❌ Nginx failed"
          
          echo "API test:"
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health && echo " ✅ API responding" || echo " ❌ API not responding"
          
          echo "Frontend test:"
          curl -s -o /dev/null -w "%{http_code}" http://localhost/ && echo " ✅ Frontend responding" || echo " ❌ Frontend not responding"
          
          # Cleanup
          rm -rf /tmp/deploy
          
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Access your application at: http://129.212.239.12"
          echo "🔧 Backend API at: http://129.212.239.12/api"
