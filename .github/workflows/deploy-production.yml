name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  BACKEND_DIR: HRM-main
  FRONTEND_DIR: PirisaHR-main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

    - name: Build Backend
      working-directory: ${{ env.BACKEND_DIR }}
      run: |
        echo "📦 Building backend..."
        chmod +x mvnw
        ./mvnw clean package -DskipTests -e
        echo "📂 Checking target directory..."
        ls -la target/
        echo "🔍 Finding JAR files..."
        find . -name "*.jar" -type f
        
    - name: Build Frontend
      working-directory: ${{ env.FRONTEND_DIR }}
      run: |
        echo "🎨 Building frontend..."
        npm ci --prefer-offline --no-audit
        npm run build
        echo "📂 Checking dist directory..."
        ls -la dist/

    - name: Prepare deployment files
      run: |
        echo "📦 Preparing deployment package..."
        mkdir -p deploy-package/backend
        mkdir -p deploy-package/frontend
        mkdir -p deploy-package/scripts
        
        echo "🔍 Looking for JAR files..."
        find ${{ env.BACKEND_DIR }} -name "*.jar" -type f
        
        # Copy JAR file - find and copy the first JAR that's not empty
        JAR_FILE=$(find ${{ env.BACKEND_DIR }}/target -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -type f | head -1)
        if [ -n "$JAR_FILE" ]; then
          echo "✅ Found JAR: $JAR_FILE"
          cp "$JAR_FILE" deploy-package/backend/app.jar
        else
          echo "❌ No JAR file found!"
          echo "Contents of backend directory:"
          ls -laR ${{ env.BACKEND_DIR }}/target/
          exit 1
        fi
        
        # Copy frontend
        if [ -d "${{ env.FRONTEND_DIR }}/dist" ]; then
          echo "✅ Copying frontend..."
          cp -r ${{ env.FRONTEND_DIR }}/dist/* deploy-package/frontend/
        else
          echo "❌ Frontend dist not found!"
          exit 1
        fi
        
        # Copy production scripts
        cat > deploy-package/scripts/setup-production.sh << 'EOF'
#!/bin/bash

set -e

echo "🚀 Production Setup for Pirisa HRM"
echo "=================================="

# Configuration
APP_DIR="/var/www/pirisa"
BACKEND_DIR="$APP_DIR/backend"
FRONTEND_DIR="$APP_DIR/frontend"
SERVICE_NAME="pirisa-backend"

# Create directories
echo "📁 Creating directories..."
sudo mkdir -p $BACKEND_DIR
sudo mkdir -p $FRONTEND_DIR
sudo mkdir -p /var/log/pirisa

# Stop existing service
echo "⏹️ Stopping existing service..."
sudo systemctl stop $SERVICE_NAME || true
sudo systemctl disable $SERVICE_NAME || true

# Deploy Backend
echo "📦 Deploying backend..."
if [ -f "/tmp/deploy/backend/app.jar" ]; then
    sudo cp /tmp/deploy/backend/app.jar $BACKEND_DIR/app.jar
    echo "✅ Backend JAR deployed"
else
    echo "❌ Backend JAR not found!"
    exit 1
fi

# Deploy Frontend
echo "🎨 Deploying frontend..."
if [ -d "/tmp/deploy/frontend" ] && [ "$(ls -A /tmp/deploy/frontend)" ]; then
    sudo rm -rf $FRONTEND_DIR/*
    sudo cp -r /tmp/deploy/frontend/* $FRONTEND_DIR/
    echo "✅ Frontend deployed"
else
    echo "❌ Frontend files not found!"
    exit 1
fi

# Create production application properties
echo "📝 Creating application properties..."
sudo tee $BACKEND_DIR/application.properties > /dev/null << 'EOL'
